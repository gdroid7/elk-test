<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Go Log Simulator</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { background: #0f172a; color: #e2e8f0; font-family: monospace; min-height: 100vh; }
header { display: flex; align-items: center; justify-content: space-between; padding: 16px 24px; background: #1e293b; border-bottom: 1px solid #334155; }
header h1 { font-size: 1.2rem; color: #7dd3fc; }
#status-dot { width: 10px; height: 10px; border-radius: 50%; background: #64748b; display: inline-block; margin-right: 6px; }
#status-dot.up { background: #4ade80; }
#status-dot.down { background: #f87171; }
#ist-time { font-size: 0.8rem; color: #94a3b8; }
main { padding: 24px; max-width: 1200px; margin: 0 auto; }
.scenarios-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(340px, 1fr)); gap: 16px; margin-bottom: 32px; }
.card { background: #1e293b; border: 1px solid #334155; border-radius: 8px; padding: 16px; }
.card h2 { font-size: 1rem; color: #7dd3fc; margin-bottom: 6px; }
.card p { font-size: 0.8rem; color: #94a3b8; margin-bottom: 10px; }
.card-meta { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 12px; }
.badge { font-size: 0.7rem; background: #0f172a; border: 1px solid #334155; padding: 2px 6px; border-radius: 4px; color: #7dd3fc; }
.card-controls { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
.card-controls label { font-size: 0.8rem; color: #94a3b8; display: flex; align-items: center; gap: 4px; cursor: pointer; }
.btn { padding: 6px 14px; border: none; border-radius: 4px; cursor: pointer; font-size: 0.85rem; font-family: monospace; }
.btn-run { background: #2563eb; color: #fff; }
.btn-run:hover { background: #1d4ed8; }
.btn-run:disabled { background: #334155; color: #64748b; cursor: not-allowed; }
.btn-sm { padding: 4px 10px; font-size: 0.75rem; background: #1e3a5f; color: #7dd3fc; border: 1px solid #2563eb; border-radius: 4px; cursor: pointer; text-decoration: none; display: inline-block; }
.btn-sm:hover { background: #2563eb; }
.card-links { margin-top: 8px; display: flex; gap: 8px; flex-wrap: wrap; }
#output-section { background: #0b1120; border: 1px solid #334155; border-radius: 8px; padding: 16px; }
#output-section h3 { color: #94a3b8; margin-bottom: 10px; font-size: 0.9rem; display: flex; justify-content: space-between; align-items: center; }
#output { min-height: 200px; max-height: 500px; overflow-y: auto; font-size: 0.78rem; line-height: 1.6; white-space: pre-wrap; word-break: break-all; }
.log-INFO  { color: #4ade80; }
.log-WARN  { color: #fbbf24; }
.log-ERROR { color: #f87171; }
.log-other { color: #94a3b8; }
.btn-clear { background: #334155; color: #e2e8f0; font-size: 0.75rem; padding: 3px 8px; border: none; border-radius: 4px; cursor: pointer; }
.btn-clear:hover { background: #475569; }
</style>
</head>
<body>
<header>
  <h1>Go Log Simulator</h1>
  <div style="display:flex;align-items:center;gap:16px">
    <span id="ist-time"></span>
    <span><span id="status-dot"></span><span id="status-text" style="font-size:0.8rem;color:#94a3b8">checking...</span></span>
  </div>
</header>
<main>
  <div class="scenarios-grid" id="scenarios-grid"></div>
  <div id="output-section">
    <h3>
      <span id="output-title">Output</span>
      <button class="btn-clear" onclick="clearOutput()">Clear</button>
    </h3>
    <pre id="output"></pre>
  </div>
</main>
<script>
let activeES = null;

async function loadScenarios() {
  const res = await fetch('/api/scenarios');
  const scenarios = await res.json();
  const grid = document.getElementById('scenarios-grid');
  grid.innerHTML = '';
  if (!scenarios || scenarios.length === 0) {
    grid.innerHTML = '<p style="color:#64748b;font-size:0.85rem">No scenarios registered yet.</p>';
    return;
  }
  scenarios.forEach(s => {
    const card = document.createElement('div');
    card.className = 'card';
    card.innerHTML = `
      <h2>${s.name}</h2>
      <p>${s.description}</p>
      <div class="card-meta">
        <span class="badge">${s.log_count} logs</span>
        <span class="badge">${s.duration_sec}s</span>
        <span class="badge" title="Elasticsearch index">${s.index}</span>
      </div>
      <div class="card-controls">
        <label><input type="checkbox" id="compress-${s.id}" checked> Compress Time</label>
        <button class="btn btn-run" id="run-${s.id}" onclick="runScenario('${s.id}')">&#9654; Run</button>
      </div>
      <div class="card-links">
        <a class="btn-sm" href="http://localhost:5601/app/dashboards#/view/sim-${s.id}-dashboard" target="_blank">Dashboard</a>
        <a class="btn-sm" href="http://localhost:5601/app/discover#/?_a=(index:'sim-${s.id}*')" target="_blank">Discover</a>
      </div>
    `;
    grid.appendChild(card);
  });
}

function runScenario(id) {
  if (activeES) { activeES.close(); activeES = null; }
  document.getElementById('output').innerHTML = '';
  document.getElementById('output-title').textContent = 'Running: ' + id;

  const compress = document.getElementById('compress-' + id)?.checked !== false;
  const url = '/api/run/' + id + '?compress=' + compress;

  const btn = document.getElementById('run-' + id);
  if (btn) btn.disabled = true;

  activeES = new EventSource(url);
  activeES.onmessage = e => {
    if (e.data === '[DONE]') {
      activeES.close(); activeES = null;
      if (btn) btn.disabled = false;
      document.getElementById('output-title').textContent = 'Output (done)';
      return;
    }
    try {
      const obj = JSON.parse(e.data);
      const lvl = (obj.level || 'other').toUpperCase();
      const cls = ['INFO','WARN','ERROR'].includes(lvl) ? 'log-'+lvl : 'log-other';
      const line = document.createElement('span');
      line.className = cls;
      line.textContent = e.data + '\n';
      const out = document.getElementById('output');
      out.appendChild(line);
      out.scrollTop = out.scrollHeight;
    } catch {
      const out = document.getElementById('output');
      out.textContent += e.data + '\n';
      out.scrollTop = out.scrollHeight;
    }
  };
  activeES.onerror = () => {
    if (btn) btn.disabled = false;
    activeES.close(); activeES = null;
  };
}

function clearOutput() {
  document.getElementById('output').innerHTML = '';
  document.getElementById('output-title').textContent = 'Output';
}

async function checkStatus() {
  try {
    const res = await fetch('/api/status');
    const data = await res.json();
    const dot = document.getElementById('status-dot');
    const txt = document.getElementById('status-text');
    if (data.status === 'ok') {
      dot.className = 'up';
      txt.textContent = 'server up';
    } else {
      dot.className = 'down';
      txt.textContent = 'server error';
    }
  } catch {
    document.getElementById('status-dot').className = 'down';
    document.getElementById('status-text').textContent = 'unreachable';
  }
}

function updateIST() {
  const now = new Date().toLocaleTimeString('en-IN', { timeZone: 'Asia/Kolkata', hour12: false });
  document.getElementById('ist-time').textContent = 'IST ' + now;
}

loadScenarios();
checkStatus();
updateIST();
setInterval(checkStatus, 5000);
setInterval(updateIST, 1000);
</script>
</body>
</html>
